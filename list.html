<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登録一覧 | ミニ蔵書管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <header class="site-header">
    <h1 class="logo">登録一覧</h1>
    <p class="tagline">登録済みの本をまとめて確認</p>
  </header>

  <main class="layout layout--single">
    <section class="panel panel--list" aria-labelledby="list-title">
      <div class="list-toolbar">
        <div class="toolbar-left">
          <h2 id="list-title">読書一覧</h2>
          <p id="stats" class="stats" aria-live="polite"></p>
        </div>
        <div class="toolbar-right">
          <a class="btn btn--link" href="./index.html">追加画面へ</a>
          <input type="search" id="search" class="search" placeholder="タイトル・著者で検索…" autocomplete="off" />
        </div>
      </div>

      <div class="table-wrap" role="region" aria-label="登録一覧テーブル" tabindex="0">
        <table class="book-table">
          <thead>
            <tr>
              <th scope="col">タイトル</th>
              <th scope="col">著者</th>
              <th scope="col">状態</th>
              <th scope="col">登録日時</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <p id="empty" class="empty hidden">まだ本がありません。`追加画面へ` から登録してください。</p>
    </section>
  </main>

  <footer class="site-footer">
    <small>データはこのブラウザに保存されます（localStorage）</small>
  </footer>

  <script src="js/store.js"></script>
  <script src="js/list.js"></script>
</body>
</html>
