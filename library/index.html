<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>読書ノート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <header class="site-header">
    <h1 class="logo">読書ノート</h1>
    <p class="tagline">手元の本をひとつの棚に</p>
  </header>

  <main class="layout">
    <section class="panel panel--form" aria-labelledby="form-title">
      <h2 id="form-title">本を登録</h2>
      <form id="book-form" class="book-form">
        <label>
          <span>タイトル</span>
          <input type="text" name="title" required placeholder="例: 銀河鉄道の夜" autocomplete="off" />
        </label>
        <label>
          <span>著者</span>
          <input type="text" name="author" placeholder="例: 宮沢賢治" autocomplete="off" />
        </label>
        <label>
          <span>読了</span>
          <select name="status">
            <option value="unread">未読</option>
            <option value="reading">読書中</option>
            <option value="done">読了</option>
          </select>
        </label>
        <button type="submit" class="btn btn--primary">追加</button>
      </form>
    </section>

    <section class="panel panel--list" aria-labelledby="list-title">
      <div class="list-toolbar">
        <h2 id="list-title">読書一覧</h2>
        <div class="toolbar-right">
          <a class="btn btn--link" href="./list.html">登録一覧へ</a>
          <input type="search" id="search" class="search" placeholder="タイトル・著者で検索…" autocomplete="off" />
        </div>
      </div>
      <ul id="book-list" class="book-list"></ul>
      <p id="empty" class="empty hidden">まだ本がありません。上のフォームから追加してください。</p>
    </section>
  </main>

  <footer class="site-footer">
    <small>データはこのブラウザに保存されます（localStorage）</small>
  </footer>

  <script src="js/store.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
